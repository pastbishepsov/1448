name: app_1448
description: 14:48 — геймифицированная экосистема для компьютерных клубов

publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:         # i18n — обязательно для 3 языков
    sdk: flutter

  # HTTP
  dio: ^5.7.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.4.0

  # Navigation
  go_router: ^14.6.2

  # WebSocket
  web_socket_channel: ^3.0.1

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Maps — Google Maps (рынок ЕС/Польша)
  google_maps_flutter: ^2.9.0

  # i18n — локализация (EN основной / RU / PL)
  intl: ^0.19.0

  # UI
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.3

  # Utils
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_gen_runner: ^5.7.0       # Генерация l10n
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.13
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Локализация — EN основной, RU и PL дополнительные
  generate: true

  assets:
    - assets/images/
    - assets/animations/
